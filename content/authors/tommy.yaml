name: Tommy Honold
role: Gründer & Dating-Experte
bio: >-
  Vom Küchenmeister zum Dating Entrepreneur — Tommy Honold (Jahrgang 1977) hat
  Jobsingles und Farmersingles aufgebaut und kennt die Welt der Berufsdating-Sites
  wie kein anderer. Mit blaulichtsingles.ch bringt er Polizisten, Feuerwehrleute
  und Sanitäter zusammen.
longBio: >-
  Tommy Honold wurde 1977 geboren und begann seine Karriere als Küchenmeister.
  Doch sein unternehmerischer Geist trieb ihn in eine völlig andere Richtung:
  Er erkannte früh, dass Menschen mit besonderen Berufen — Polizisten, Feuerwehrleute,
  Sanitäter, Landwirte — eigene Dating-Plattformen brauchen, die ihre Lebensrealität
  verstehen. Schichtdienst, Nachtdienste, hohe emotionale Belastung — das versteht
  nur jemand, der selbst in diesem Umfeld lebt.

  Aus dieser Überzeugung heraus entstand das Jobsingles-Netzwerk mit Plattformen wie
  farmersingles.de, jobsingles.de und blaulichtsingles.ch. Heute verbindet Tommy
  tausende von Singles, die ihresgleichen suchen — und findet dabei selbst täglich
  neue Wege, wie Technologie echte menschliche Verbindungen schaffen kann.
