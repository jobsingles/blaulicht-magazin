name: Tommy Honold
role: Gründer & Dating-Experte
bio: >-
  Vom Küchenmeister zum Dating Entrepreneur — Tommy Honold (Jahrgang 1977) hat
  Jobsingles und Farmersingles aufgebaut und kennt die Welt der Berufsdating-Sites
  wie kein anderer. Mit blaulichtsingles.ch bringt er Polizisten, Feuerwehrleute
  und Sanitäter zusammen.
