name: Redaktion Blaulicht
role: Redaktion
bio: >-
  Die Redaktion von blaulichtsingles.ch besteht aus Fachleuten mit Erfahrung in
  Blaulicht-Berufen und Beziehungsthemen. Wir kennen die Herausforderungen von
  Schichtarbeit, Pikett und Einsatzstress — und schreiben für alle, die trotzdem
  die grosse Liebe suchen.
