name: Tommy Honold
role: Gründer & Dating-Experte
bio: >-
  Meisterkoch, Marine-Feldkoch, CEO — und seit 2008 der Mann hinter dem grössten
  Berufs-Dating-Netzwerk im DACH-Raum. Tommy Honold bringt mit blaulichtsingles.ch
  Polizisten, Feuerwehrleute und Sanitäter zusammen, die wissen, wie Schichtdienst
  wirklich klingt.
longBio: >-
  Tommy Honold, geboren 1977 am Bodensee, hat einen Lebenslauf, der eigentlich nach
  Michelin-Stern klingt — und irgendwie bei einer Dating-Plattform für Blaulicht-Kräfte
  gelandet ist. Wie das passiert? Gute Frage.

  Er fing da an, wo die meisten aufhören würden: in der Küche seines Vaters. Die
  Mettnaustube in Radolfzell war sein erstes Klassenzimmer — Schmorbraten statt
  Schulaufgaben, Ferien am Herd statt am See. Nach der Ausbildung zum Koch schickte ihn
  die Bundeswehr zur Marine (Sylt, Glücksburg, Jägerbataillon Donaueschingen) — wo er
  Offiziere und Feldjaeger bekochte. Wer unter Kapitän Leutnant Grässlin Chili ansetzt,
  der kennt Druck.

  Danach: Spitzenküche. Chef de Partie in der Traube Tonbach — eines der renommiertesten
  Hotels Deutschlands. Chef de Poissonier in der Hummer Bar Zürich. Meisterkoch IHK
  Villingen. Jahrelang Chef de Cuisine im väterlichen Restaurant, das er schliesslich
  selbst als Geschäftsführer übernahm.

  Aber parallel — ganz still, seit 2008 — baute er Jobsingles.com. Denn ihm war längst
  klar: Menschen mit aussergewöhnlichen Berufen finden auf normalen Dating-Plattformen
  kaum jemanden, der Schichtdienst, Nachtdienst und den Geruch nach Chlor oder
  Frittierfett romantisch findet.

  Nach Jahren als CEO von Ausgezeichnet.org (Bewertungsplattform mit 50 Mio.
  Unternehmenseinträgen) widmet er sich heute vollständig dem Jobsingles-Netzwerk:
  farmersingles.de, jobsingles.de, medicsingles.de und blaulichtsingles.ch.

  Er lebt in Radolfzell, direkt an der Strandbadstrasse. Der Bodensee ist sein Garten.
  Vom Herd zum Herz — und das meint er Ernst.
